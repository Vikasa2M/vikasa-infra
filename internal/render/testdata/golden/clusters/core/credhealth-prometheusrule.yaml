# AUTOGENERATED by vikasa-infra/cmd/gen
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vikasa-credhealth-core
  namespace: vikasa-core
  labels:
    vikasa.dot: exdot
    vikasa.cluster: core
    release: kube-prometheus-stack
spec:
  groups:
    - name: vikasa-credhealth-core
      rules:
        - alert: CredExpiringSoon
          expr: vikasa_cred_expiry_seconds < 3456000
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Credential {{ $labels.identity }} ({{ $labels.kind }}) expires in under 40 days"
        - alert: CredExpiryCritical
          expr: vikasa_cred_expiry_seconds < 432000
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "Credential {{ $labels.identity }} ({{ $labels.kind }}) expires in under 5 days"
        - alert: CredExpired
          expr: vikasa_cred_expiry_seconds < 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Credential {{ $labels.identity }} ({{ $labels.kind }}) has EXPIRED"
        - alert: CredHealthStale
          expr: time() - vikasa_credhealth_last_scan_timestamp_seconds > 86400
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "credhealth has not reported in over 24h (expiry monitor is blind)"
