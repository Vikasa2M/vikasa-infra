name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # ubuntu-latest ships helm; TestGenGoldenHelm_RendersUnderHelm silently
      # skips without it, so fail loudly here if the image ever drops it.
      - name: helm present
        run: helm version

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needed:"; echo "$out"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
          staticcheck -tags integration ./test/integration/

      - name: build
        run: go build ./...

      - name: unit tests (includes golden trees)
        run: go test -count=1 ./...

      - name: integration tests (embedded NATS)
        run: go test -tags integration -count=1 ./test/integration/
