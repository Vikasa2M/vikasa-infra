# AUTOGENERATED by vikasa-infra/cmd/gen
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vikasa-nats-core
  namespace: vikasa-core
  labels:
    vikasa.dot: exdot
    vikasa.cluster: core
    release: kube-prometheus-stack
spec:
  groups:
    - name: vikasa-nats-core
      rules:
        - alert: NatsServerDown
          expr: up{job="nats", namespace="vikasa-core"} == 0
          for: 5m
          labels:
            severity: critical
            vikasa_cluster: core
          annotations:
            summary: "NATS server down in cluster core"
        - alert: NatsSlowConsumers
          expr: gnatsd_varz_slow_consumers{namespace="vikasa-core"} > 0
          for: 10m
          labels:
            severity: warning
            vikasa_cluster: core
          annotations:
            summary: "NATS slow consumers in cluster core"
        - alert: JetStreamStorageHigh
          expr: gnatsd_jsz_max_storage{namespace="vikasa-core"} > 0 and gnatsd_jsz_storage{namespace="vikasa-core"} / gnatsd_jsz_max_storage{namespace="vikasa-core"} > 0.8
          for: 10m
          labels:
            severity: critical
            vikasa_cluster: core
          annotations:
            summary: "JetStream store >80% of max in cluster core — publishers fail when full (finding C2)"
        - alert: JetStreamConsumerLagging
          expr: gnatsd_jsz_consumer_num_pending{namespace="vikasa-core"} > 100000
          for: 15m
          labels:
            severity: warning
            vikasa_cluster: core
          annotations:
            summary: "JetStream consumer backlog >100k in cluster core — a sink is falling behind"
        - alert: JetStreamAssetsHigh
          expr: gnatsd_jsz_total_streams{namespace="vikasa-core"} + gnatsd_jsz_total_consumers{namespace="vikasa-core"} > 1500
          for: 30m
          labels:
            severity: warning
            vikasa_cluster: core
          annotations:
            summary: "JetStream HA-assets approaching the ~2k/node budget in cluster core — add nodes or partitions"
