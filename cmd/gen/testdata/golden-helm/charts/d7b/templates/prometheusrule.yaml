# AUTOGENERATED by vikasa-infra/cmd/gen
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vikasa-nats-d7b
  namespace: {{ .Values.namespace }}
  labels:
    vikasa.dot: exdot
    vikasa.cluster: d7b
    release: {{ .Values.prometheusRelease }}
spec:
  groups:
    - name: vikasa-nats-d7b
      rules:
        - alert: NatsServerDown
          expr: up{job="nats", namespace="{{ .Values.namespace }}"} == 0
          for: 5m
          labels:
            severity: critical
            vikasa_cluster: d7b
          annotations:
            summary: "NATS server down in cluster d7b"
        - alert: NatsSlowConsumers
          expr: gnatsd_varz_slow_consumers{namespace="{{ .Values.namespace }}"} > 0
          for: 10m
          labels:
            severity: warning
            vikasa_cluster: d7b
          annotations:
            summary: "NATS slow consumers in cluster d7b"
        - alert: JetStreamStorageHigh
          expr: gnatsd_jsz_max_storage{namespace="{{ .Values.namespace }}"} > 0 and gnatsd_jsz_storage{namespace="{{ .Values.namespace }}"} / gnatsd_jsz_max_storage{namespace="{{ .Values.namespace }}"} > 0.8
          for: 10m
          labels:
            severity: critical
            vikasa_cluster: d7b
          annotations:
            summary: "JetStream store >80% of max in cluster d7b — publishers fail when full (finding C2)"
        - alert: JetStreamConsumerLagging
          expr: gnatsd_jsz_consumer_num_pending{namespace="{{ .Values.namespace }}"} > 100000
          for: 15m
          labels:
            severity: warning
            vikasa_cluster: d7b
          annotations:
            summary: "JetStream consumer backlog >100k in cluster d7b — a sink is falling behind"
        - alert: JetStreamAssetsHigh
          expr: gnatsd_jsz_total_streams{namespace="{{ .Values.namespace }}"} + gnatsd_jsz_total_consumers{namespace="{{ .Values.namespace }}"} > 1500
          for: 30m
          labels:
            severity: warning
            vikasa_cluster: d7b
          annotations:
            summary: "JetStream HA-assets approaching the ~2k/node budget in cluster d7b — add nodes or partitions"
        - alert: NatsLeafDown
          expr: gnatsd_varz_leafnodes{namespace="{{ .Values.namespace }}"} < 1
          for: 5m
          labels:
            severity: warning
            vikasa_cluster: d7b
          annotations:
            summary: "Regional cluster d7b has no leaf uplink to central"
