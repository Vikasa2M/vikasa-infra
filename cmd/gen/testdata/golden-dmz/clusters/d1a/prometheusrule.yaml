# AUTOGENERATED by vikasa-infra/cmd/gen
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vikasa-nats-d1a
  namespace: vikasa-d1a
  labels:
    vikasa.dot: exdot
    vikasa.cluster: d1a
    release: kube-prometheus-stack
spec:
  groups:
    - name: vikasa-nats-d1a
      rules:
        - alert: NatsServerDown
          expr: up{job="nats", namespace="vikasa-d1a"} == 0
          for: 5m
          labels:
            severity: critical
            vikasa_cluster: d1a
          annotations:
            summary: "NATS server down in cluster d1a"
        - alert: NatsSlowConsumers
          expr: gnatsd_varz_slow_consumers{namespace="vikasa-d1a"} > 0
          for: 10m
          labels:
            severity: warning
            vikasa_cluster: d1a
          annotations:
            summary: "NATS slow consumers in cluster d1a"
        - alert: JetStreamStorageHigh
          expr: gnatsd_jsz_max_storage{namespace="vikasa-d1a"} > 0 and gnatsd_jsz_storage{namespace="vikasa-d1a"} / gnatsd_jsz_max_storage{namespace="vikasa-d1a"} > 0.8
          for: 10m
          labels:
            severity: critical
            vikasa_cluster: d1a
          annotations:
            summary: "JetStream store >80% of max in cluster d1a — publishers fail when full (finding C2)"
        - alert: JetStreamConsumerLagging
          expr: gnatsd_jsz_consumer_num_pending{namespace="vikasa-d1a"} > 100000
          for: 15m
          labels:
            severity: warning
            vikasa_cluster: d1a
          annotations:
            summary: "JetStream consumer backlog >100k in cluster d1a — a sink is falling behind"
        - alert: JetStreamAssetsHigh
          expr: gnatsd_jsz_total_streams{namespace="vikasa-d1a"} + gnatsd_jsz_total_consumers{namespace="vikasa-d1a"} > 1500
          for: 30m
          labels:
            severity: warning
            vikasa_cluster: d1a
          annotations:
            summary: "JetStream HA-assets approaching the ~2k/node budget in cluster d1a — add nodes or partitions"
        - alert: NatsLeafDown
          expr: gnatsd_varz_leafnodes{namespace="vikasa-d1a"} < 1
          for: 5m
          labels:
            severity: warning
            vikasa_cluster: d1a
          annotations:
            summary: "Regional cluster d1a has no leaf uplink to central"
