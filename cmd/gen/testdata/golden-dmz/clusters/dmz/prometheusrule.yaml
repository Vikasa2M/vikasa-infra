# AUTOGENERATED by vikasa-infra/cmd/gen
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: vikasa-nats-dmz
  namespace: vikasa-dmz
  labels:
    vikasa.dot: exdot
    vikasa.cluster: dmz
    release: kube-prometheus-stack
spec:
  groups:
    - name: vikasa-nats-dmz
      rules:
        - alert: NatsServerDown
          expr: up{job="nats", namespace="vikasa-dmz"} == 0
          for: 5m
          labels:
            severity: critical
            vikasa_cluster: dmz
          annotations:
            summary: "NATS server down in cluster dmz"
        - alert: NatsSlowConsumers
          expr: gnatsd_varz_slow_consumers{namespace="vikasa-dmz"} > 0
          for: 10m
          labels:
            severity: warning
            vikasa_cluster: dmz
          annotations:
            summary: "NATS slow consumers in cluster dmz"
        - alert: JetStreamStorageHigh
          expr: gnatsd_jsz_max_storage{namespace="vikasa-dmz"} > 0 and gnatsd_jsz_storage{namespace="vikasa-dmz"} / gnatsd_jsz_max_storage{namespace="vikasa-dmz"} > 0.8
          for: 10m
          labels:
            severity: critical
            vikasa_cluster: dmz
          annotations:
            summary: "JetStream store >80% of max in cluster dmz — publishers fail when full (finding C2)"
        - alert: JetStreamConsumerLagging
          expr: gnatsd_jsz_consumer_num_pending{namespace="vikasa-dmz"} > 100000
          for: 15m
          labels:
            severity: warning
            vikasa_cluster: dmz
          annotations:
            summary: "JetStream consumer backlog >100k in cluster dmz — a sink is falling behind"
        - alert: JetStreamAssetsHigh
          expr: gnatsd_jsz_total_streams{namespace="vikasa-dmz"} + gnatsd_jsz_total_consumers{namespace="vikasa-dmz"} > 1500
          for: 30m
          labels:
            severity: warning
            vikasa_cluster: dmz
          annotations:
            summary: "JetStream HA-assets approaching the ~2k/node budget in cluster dmz — add nodes or partitions"
        - alert: NatsLeafDown
          expr: gnatsd_varz_leafnodes{namespace="vikasa-dmz"} < 1
          for: 5m
          labels:
            severity: warning
            vikasa_cluster: dmz
          annotations:
            summary: "Regional cluster dmz has no leaf uplink to central"
